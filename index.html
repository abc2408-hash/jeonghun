<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Architecture Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #fafafa; color: #333; line-height: 1.6; }
        
        /* 공통 네비게이션 */
        nav { display: flex; justify-content: space-between; padding: 20px 50px; background-color: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        nav .logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; text-decoration: none; color: #333; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #555; font-size: 0.9rem; transition: color 0.3s ease; }
        nav a:hover { color: #000; font-weight: bold; }
        /* 현재 위치한 메뉴 강조 */
        nav a.active { color: #000; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 5px; }

        /* 서브페이지 내용 */
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; min-height: calc(100vh - 145px); }
        .page-title { text-align: left; font-size: 2rem; margin-bottom: 40px; font-weight: 300; letter-spacing: 2px; border-left: 4px solid #333; padding-left: 15px; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .portfolio-item { background: #fff; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s ease; cursor: pointer; }
        .portfolio-item:hover { transform: translateY(-10px); }
        .portfolio-img { width: 100%; height: 250px; background-color: #ccc; display: flex; align-items: center; justify-content: center; color: #888; }
        .portfolio-info { padding: 20px; }
        .portfolio-info h3 { font-size: 1.2rem; margin-bottom: 10px; }
        .portfolio-info p { font-size: 0.9rem; color: #777; }

        /* 공통 푸터 */
        footer { background-color: #222; color: #fff; text-align: center; padding: 30px 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- 공통 상단 네비게이션 -->
    <nav>
        <a href="index.html" class="logo">ARCHI.PORTFOLIO</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html" class="active">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- 프로젝트 리스트 영역 -->
    <main class="container">
        <h2 class="page-title">Selected Works</h2>
        <div class="portfolio-grid">
            <div class="portfolio-item">
                <div class="portfolio-img">[프로젝트 1 이미지]</div>
                <div class="portfolio-info">
                    <h3>도심 속 공유 오피스 설계</h3>
                    <p>2025 | 상업시설 | 서울</p>
                </div>
            </div>
            <div class="portfolio-item">
                <div class="portfolio-img">[프로젝트 2 이미지]</div>
                <div class="portfolio-info">
                    <h3>자연과 어우러진 주택</h3>
                    <p>2024 | 주거시설 | 제주</p>
                </div>
            </div>
            <div class="portfolio-item">
                <div class="portfolio-img">[프로젝트 3 이미지]</div>
                <div class="portfolio-info">
                    <h3>복합 문화 공간 리모델링</h3>
                    <p>2023 | 공공시설 | 부산</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 공통 하단 푸터 -->
    <footer>
        &copy; 2026 OOO. All Rights Reserved.
    </footer>

</body>
</html>
